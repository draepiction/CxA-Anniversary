<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petrichor: For Clara</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=La+Belle+Aurore&display=swap');

        :root {
            --book-height: 480px;
            --book-width: 340px;
            --speed: 1.1s; 
            --paper-texture: url('https://images.unsplash.com/photo-1637325258040-d2f09636ecf6?fm=jpg&q=60&w=3000&auto=format&fit=crop');
            --cover-texture: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            --desk-texture: url('https://images.unsplash.com/photo-1546484396-fb3fc6f95f98?fm=jpg&q=60&w=3000&auto=format&fit=crop');
            --paper-base: #fdfaf0;
            --cover-base: #354230; 
            --cover-accent: #b89166;
            --page-text: #3d342d;
            --brass-dark: #3a2a1b;
            --brass-mid: #917148;
            --brass-light: #e6c59d;
            --brass-shine: #ffffff;
        }

        body {
            background-color: #1a1512;
            background-image: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%), var(--desk-texture);
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            font-family: 'EB Garamond', serif;
            touch-action: manipulation;
        }

        /* --- THE DYNAMIC SCALE SYSTEM --- */
        .scene { 
            perspective: 2000px; 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
        }

        .book { 
            position: relative; 
            width: var(--book-width); height: var(--book-height); 
            transition: transform var(--speed) cubic-bezier(0.645, 0.045, 0.355, 1); 
            transform-style: preserve-3d;
        }

        .book.open { transform: translateX(25%); }
        .book.fully-closed-back { transform: translateX(-25%); }

        .page { 
            position: absolute; width: 100%; height: 100%; 
            transform-origin: left center; transform-style: preserve-3d; 
            transition: transform var(--speed) cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .page.flipped { transform: rotateY(-180deg); }

        .front, .back { 
            position: absolute; width: 100%; height: 100%; 
            background-color: var(--paper-base); background-image: var(--paper-texture);
            backface-visibility: hidden; padding: 30px; box-sizing: border-box; 
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); 
        }
        .front { border-radius: 2px 8px 8px 2px; transform: translateZ(1px); }
        .back { transform: rotateY(180deg) translateZ(1px); border-radius: 8px 2px 2px 8px; }

        /* Cover & Elements */
        .page.cover .front, .back-cover-page { 
            background-color: var(--cover-base) !important; background-image: var(--cover-texture) !important; 
            color: var(--cover-accent); text-align: center;
        }

        .corner-protector { 
            position: absolute; width: 50px; height: 50px; z-index: 10; pointer-events: none; 
            background: linear-gradient(135deg, var(--brass-light), var(--brass-mid), var(--brass-dark));
            box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }
        .front .cp-top { top: -2px; right: -2px; border-radius: 0 8px 0 100%; }
        .front .cp-bottom { bottom: -2px; right: -2px; border-radius: 100% 0 8px 0; }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin: 0; }
        .handwritten { font-family: 'La Belle Aurore', cursive; font-size: 1.15rem; color: #4a5a48; line-height: 1.4; }

        /* --- THE MOBILE RE-DESIGN (STRICT) --- */
        @media (max-width: 600px) {
            :root {
                /* Use viewport-based sizing so it CAN'T overflow */
                --book-width: 42vw; 
                --book-height: 55vh; 
            }

            .scene { perspective: 1200px; }

            /* Scale down all decorative internal elements */
            .front, .back { padding: 12px; }
            
            /* Brass corners shrink to half size */
            .corner-protector { width: 25px; height: 25px; }

            /* Text auto-shrinks for the smaller canvas */
            h1 { font-size: 1.1rem; }
            h2 { font-size: 0.9rem; }
            .handwritten { font-size: 0.8rem; line-height: 1.2; }
            
            /* Tighten up the spreads so they fit perfectly */
            .book.open { transform: translateX(21vw) scale(1); }
            .book.fully-closed-back { transform: translateX(-21vw) scale(1); }

            .cover-frame { top: 8px; left: 8px; right: 8px; bottom: 8px; border-width: 2px; }

            .desk-reveal {
                top: 10%; right: auto; left: 0; width: 100%;
                transform: none; text-align: center;
            }
            .desk-reveal h1 { font-size: 1.5rem; }
        }

        .cover-frame {
            position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 3px double rgba(184, 145, 102, 0.3); pointer-events: none;
        }

        .content-scroll { height: 100%; overflow-y: auto; scrollbar-width: none; }
    </style>
</head>
<body>

<div id="rain-entrance" onclick="startExperience()" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; display:flex; align-items:center; justify-content:center; cursor:pointer;">
    <h2 style="color:var(--cover-accent); font-family:'Playfair Display'; font-style:italic;">Click to Open...</h2>
</div>

<div class="scene">
    <div class="book" id="book">
        
        <div class="page cover">
            <div class="front">
                <div class="corner-protector cp-top"></div>
                <div class="corner-protector cp-bottom"></div>
                <div class="cover-frame"></div>
                <div style="margin-top: 60%;">
                    <h1>Petrichor</h1>
                    <p style="font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">For Clara</p>
                </div>
            </div>
            <div class="back" style="background-color: #d1c7b1;">
                <div class="content-scroll">
                    <p class="handwritten" style="text-align:center; margin-top: 40%;">To my Wildwood girl...</p>
                </div>
            </div>
        </div>

        <div class="page">
            <div class="front">
                <h2 style="font-family:'Playfair Display';">Preface</h2>
                <div class="content-scroll"><p class="handwritten">This is where the text stays neat and small on mobile.</p></div>
            </div>
            <div class="back">
                <h2 style="font-family:'Playfair Display';">The Registry</h2>
                <div class="content-scroll"><p class="handwritten">I remember when...</p></div>
            </div>
        </div>

        <div class="page">
            <div class="front"></div>
            <div class="back back-cover-page">
                <div class="cover-frame"></div>
                <p style="opacity: 0.2; font-size: 2rem;">❦</p>
            </div>
        </div>

    </div>

    <div class="desk-reveal" id="anniversary-text" style="position:absolute; opacity:0; transition:1.5s;">
        <h1 style="color:var(--cover-accent); font-family:'Playfair Display'; font-style:italic;">Happy Anniversary</h1>
    </div>
</div>

<script>
    function startExperience() {
        document.getElementById('rain-entrance').style.display = 'none';
    }

    const pages = document.querySelectorAll('.page');
    const book = document.getElementById('book');
    const reveal = document.getElementById('anniversary-text');

    pages.forEach((page, index) => {
        page.style.zIndex = pages.length - index;
        
        page.addEventListener('click', () => {
            page.classList.toggle('flipped');
            
            // Adjust Z-Index for smooth stacking
            if (page.classList.contains('flipped')) {
                setTimeout(() => { page.style.zIndex = 20 + index; }, 500);
            } else {
                setTimeout(() => { page.style.zIndex = pages.length - index; }, 500);
            }

            // Book State Logic
            setTimeout(() => {
                const flippedCount = document.querySelectorAll('.flipped').length;
                book.classList.toggle('open', flippedCount > 0 && flippedCount < pages.length);
                book.classList.toggle('fully-closed-back', flippedCount === pages.length);
                reveal.style.opacity = (flippedCount === pages.length) ? "1" : "0";
            }, 100);
        });
    });
</script>
</body>
</html>
